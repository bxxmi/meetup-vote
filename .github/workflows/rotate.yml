name: rotate-storage

# jsonblob 무료 저장소는 생성 후 24시간이면 삭제되므로,
# 4시간마다 현재 데이터를 새 blob으로 복사하고 state.json 주소를 갈아끼운다.
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rotate jsonblob
        run: |
          set -e
          CUR=$(jq -r .api state.json)
          DATA=$(curl -fsS "$CUR?t=$(date +%s)") || DATA='{"votes":{}}'
          echo "current data: $DATA"
          LOC=$(curl -fsS -D - -o /dev/null -X POST https://jsonblob.com/api/jsonBlob \
            -H 'Content-Type: application/json' -d "$DATA" \
            | tr -d '\r' | awk 'tolower($1)=="location:"{print $2}')
          test -n "$LOC"
          echo "{\"api\":\"https://jsonblob.com$LOC\"}" > state.json
          git config user.name "rotate-bot"
          git config user.email "rotate-bot@users.noreply.github.com"
          git add state.json
          git commit -m "chore: rotate storage blob"
          git push
